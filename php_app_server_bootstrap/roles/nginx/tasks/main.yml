---
- name: Set desired nginx state
  set_fact:
    nginx_desired_state: "{{ nginx_state | default('present') }}"

- name: Install nginx stack
  apt:
    name:
    - nginx
    - nginx-common
    - nginx-core
    state: present
    update_cache: yes
  when: nginx_desired_state == "present"
  become: true

- name: Ensure nginx service is running
  service:
    name: nginx
    state: started
    enabled: true
  when: nginx_desired_state == "present"
  become: true

- name: Stop nginx service when removing
  service:
    name: nginx
    state: stopped
    enabled: false
  when: nginx_desired_state == "absent"
  ignore_errors: true
  become: true

- name: Remove nginx stack
  apt:
    name:
    - nginx
    - nginx-common
    - nginx-core
    state: absent
    purge: yes
  when: nginx_desired_state == "absent"
  become: true
